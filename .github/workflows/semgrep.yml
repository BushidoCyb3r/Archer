name: semgrep

# Security scan on every push to main and on every PR. Also runs weekly
# so newly-published rules catch issues in code that hasn't changed.
#
# Findings appear in the repo's Security → Code scanning tab regardless
# of exit code. The --error flag makes the job fail when any ERROR-severity
# finding is present — this is a hard pre-merge gate. A new ERROR-severity
# finding blocks the PR until it's fixed or, if it's a confirmed
# false-positive, suppressed with a .semgrepignore entry or an inline
# `// nosemgrep: <rule-id>` comment.
#
# Rulesets:
#   p/golang  — SQL injection, command injection, path traversal, SSRF,
#               unsafe reflect, integer overflow in crypto. High signal
#               for Go web servers.
#   p/secrets — hardcoded credentials and API keys. Catches keys
#               accidentally committed alongside config.
#   p/docker  — Dockerfile hygiene: USER, ADD vs COPY, unpinned bases.
#
# The semgrep/semgrep image is pinned to a content digest (below) and the
# third-party actions to commit SHAs, the same way govulncheck is pinned
# in ci.yml — a floating tag is a supply-chain entry point and an unpinned
# rule set can start failing unrelated PRs when upstream ships new rules.
# Bump the digest deliberately; the trailing comment records its tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC

permissions:
  contents: read
  security-events: write   # required to upload SARIF to the Security tab

jobs:
  scan:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:207983631beecdbe7fa29196c7f4a7a5f29033933cdb76c687ce4a672e07618d # latest @ 2026-06-03
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Scan
        run: |
          semgrep \
            --config p/golang \
            --config p/secrets \
            --config p/docker \
            --sarif \
            --output semgrep.sarif \
            --error \
            .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        if: always()
        with:
          sarif_file: semgrep.sarif
