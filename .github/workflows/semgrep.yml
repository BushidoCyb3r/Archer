name: semgrep

# Security scan on every push to main and on every PR. Also runs weekly
# so newly-published rules catch issues in code that hasn't changed.
#
# Findings appear in the repo's Security → Code scanning tab regardless
# of exit code. The --error flag makes the job fail when any ERROR-severity
# finding is present; continue-on-error: true is set for the initial run
# so the first scan populates the Security tab without blocking PRs.
# After triaging the initial results and adding .semgrepignore entries for
# confirmed false-positives, remove the continue-on-error line to make
# this a hard gate.
#
# Rulesets:
#   p/golang  — SQL injection, command injection, path traversal, SSRF,
#               unsafe reflect, integer overflow in crypto. High signal
#               for Go web servers.
#   p/secrets — hardcoded credentials and API keys. Catches keys
#               accidentally committed alongside config.
#
# Pin semgrep/semgrep to a specific tag once the first run is clean, the
# same way govulncheck is pinned in ci.yml — an unpinned image can start
# failing unrelated PRs when upstream ships new rules.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC

permissions:
  contents: read
  security-events: write   # required to upload SARIF to the Security tab

jobs:
  scan:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Scan
        run: |
          semgrep \
            --config p/golang \
            --config p/secrets \
            --sarif \
            --output semgrep.sarif \
            --error \
            .
        continue-on-error: true   # remove after initial triage

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
