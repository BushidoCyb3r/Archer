<!DOCTYPE html>
<html lang="en" data-theme="cobalt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archer — Sign In</title>
  <script>
    (function () {
      var ok = ['cobalt', 'phosphor', 'gh-dark', 'boardroom', 'blackout'];
      var t = localStorage.getItem('archer.theme');
      document.documentElement.setAttribute('data-theme', ok.indexOf(t) >= 0 ? t : 'cobalt');
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/themes.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(circle at 15% 0%, var(--accent-soft), transparent 50%),
        radial-gradient(circle at 85% 100%, var(--accent-soft), transparent 55%),
        var(--bg-base);
      color: var(--fg-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--bg-elev-1);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-glow);
      color: var(--accent);
      margin-bottom: 14px;
    }
    .brand-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--fg-primary);
      letter-spacing: 0.18em;
    }
    .brand-sub {
      font-size: 10px;
      color: var(--fg-muted);
      margin-top: 6px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 10px;
      color: var(--fg-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--fg-primary);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }
    input::placeholder { color: var(--fg-muted); opacity: 1; }

    .error {
      background: rgba(244, 63, 94, 0.08);
      border: 1px solid rgba(244, 63, 94, 0.32);
      border-radius: 5px;
      color: var(--sev-critical);
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      background: var(--accent);
      border: 1px solid transparent;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 11px;
      transition: background 0.12s;
      font-family: inherit;
      margin-top: 4px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { background: var(--accent-active); }

    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border-subtle);
      font-size: 12px;
      color: var(--fg-muted);
    }
    .footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer a:hover { color: var(--accent-hover); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="8.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="11" cy="11" r="1.75" fill="currentColor"/>
          <path d="M11 1.5 L11 4.5 M11 17.5 L11 20.5 M1.5 11 L4.5 11 M17.5 11 L20.5 11"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-name">ARCHER</div>
      <div class="brand-sub">Silent Hunter</div>
    </div>

    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required autofocus
               placeholder="analyst@company.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="footer">
      No account? <a href="/register">Register</a>
    </div>
  </div>
</body>
</html>
