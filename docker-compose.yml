services:
  archer:
    build: .
    image: archer:latest
    container_name: archer
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs      # drop datasets here: logs/<dataset-name>/*.log — writable so the archive worker can relocate aged files
      - archer-data:/data
    environment:
      - TZ=UTC
      - GOMAXPROCS=0
    command: ["--addr=:8080", "--logs-dir=/logs"]
    deploy:
      resources:
        limits:
          cpus: '${ARCHER_CPUS:-9999}'
          memory: '${ARCHER_MEMORY:-4g}'

volumes:
  archer-data:
