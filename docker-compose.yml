services:
  archer:
    build: .
    image: archer:latest
    container_name: archer
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs:ro   # drop datasets here: logs/<dataset-name>/*.log
      - archer-data:/data
    environment:
      - TZ=UTC
      - GOMAXPROCS=0      # all cores; Go runtime auto-scales goroutines
      - GOGC=200          # less-frequent GC for large batch workloads (trades RAM for throughput)
    command: ["--addr=:8080", "--logs-dir=/logs"]
    deploy:
      resources:
        limits:
          cpus: '${ARCHER_CPUS:-9999}'
          memory: '${ARCHER_MEMORY:-999999m}'

volumes:
  archer-data:
