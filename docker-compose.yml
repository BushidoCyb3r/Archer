services:
  archer:
    build:
      context: .
      args:
        # Version metadata baked into the binary at build time. start.sh
        # populates these from the git checkout; air-gap installs that build
        # from a tarball with no git history fall back to the defaults in
        # internal/version/version.go (currently v0.1.0).
        ARCHER_VERSION: ${ARCHER_VERSION:-v0.1.0}
        ARCHER_COMMIT: ${ARCHER_COMMIT:-unknown}
        ARCHER_BUILD_TIME: ${ARCHER_BUILD_TIME:-unknown}
    image: archer:latest
    container_name: archer
    restart: unless-stopped
    ports:
      - "8080:8080"   # analyst UI (plain HTTP, LAN-side)
      - "8443:8443"   # Quiver sensor traffic (TLS, pinned-pubkey at enrollment)
      - "2222:22"     # Quiver sensor rsync (mapped to 2222 so we don't fight a host sshd on 22)
    volumes:
      - ./logs:/logs              # one subdir per sensor: logs/<sensor-name>/... — writable so the archive worker can relocate aged files
      - archer-data:/data         # /data/archer.db plus /data/tls/ (auto-generated TLS material)
      - archer-sshd:/etc/ssh/keys # sshd host keys; persisted so sensors don't see host-key changes after a rebuild
      - archer-quiver:/home/quiver/.ssh # authorized_keys; rewritten by Archer on enroll/disenroll
    environment:
      - TZ=UTC
      - GOMAXPROCS=0
    command: ["--addr=:8080", "--tls-addr=:8443", "--logs-dir=/logs"]
    deploy:
      resources:
        limits:
          cpus: '${ARCHER_CPUS:-9999}'
          memory: '${ARCHER_MEMORY:-4g}'

volumes:
  archer-data:
  archer-sshd:
  archer-quiver:
